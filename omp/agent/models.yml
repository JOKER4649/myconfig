# User-defined model providers loaded by oh-my-pi (`omp`).
# See ~/.local/share/mise/installs/npm-oh-my-pi-pi-coding-agent/.../node_modules/@oh-my-pi/pi-coding-agent/src/config/models-config-schema.ts
# for the schema; see resolve-config-value.ts for credential resolution.
#
# The `apiKey` value is NOT used as a literal: resolveConfigValue() looks up
# `process.env[<apiKey>]` first and only falls back to the literal string.
# Set NEURALWATT_API_KEY in the environment to authenticate. To pull the key
# from a keychain/prompt, prefix with `!` and use a shell command instead.
#
# All model metadata was fetched live from GET https://api.neuralwatt.com/v1/models;
# reproduce via the same endpoint if costs/limits change. Cost numbers are USD
# per million tokens.

