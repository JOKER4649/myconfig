# Hindsight 記憶體 stack — 改自官方 docker-compose 範本
# (https://github.com/vectorize-io/hindsight/tree/main/docker/docker-compose/external-pg)。
#
# 為什麼不自己 hand-roll 一個 Dockerfile：
#   * 用官方 ghcr.io/vectorize-io/hindsight image（上游已 build 好，LLM client、
#     embedding API client、MCP server 等都已接好）。
#   * 用 pgvector/pgvector:pg18（上游預設）— 跟 embedded pg0 (PG 18.1) major
#     相同，pg_dump / pg_restore round-trip 乾淨。
#   * Port 8888 是上游 API 預設。
#
# Embedding 走雲端 OpenRouter 跑 BAAI/bge-m3
# （1024-dim, 100+ 語言, 中文涵蓋比 text-embedding-3-small 好）：
#   * OPENROUTER_API_KEY 放在 .env，container 直接吃 host var
#   * bge-m3 是 1024-dim，切換後舊 vector 會被清掉、schema 重建為 1024
#   * 為什麼不用 hindsight `latest` (full) image 的 bundled embedder：
#     local provider 只支援 bge-small-en-v1.5 (英文, 384-dim) 和
#     paraphrase-multilingual-MiniLM-L12-v2 (多語言, 384-dim)，沒有 bge-m3
#
# 想切回本地 TEI sidecar (BAAI/bge-m3, CPU)：
#   1. 把 `hindsight.environment` 內的 embedding 三行換成
#      HINDSIGHT_API_EMBEDDINGS_PROVIDER: tei
#      HINDSIGHT_API_EMBEDDINGS_TEI_URL: http://tei:80
#   2. 恢復 `tei` service（跑 ghcr.io/huggingface/text-embeddings-inference）
#      並在 `hindsight.depends_on` 加回 tei: condition: service_healthy
#   3. ./tei_data 是 TEI model cache（HF hub 格式, bge-m3 ~2.3GB）
#
# 路徑備註（本檔位於 hindsight/docker-compose.yml）：
#   * `./pg_data` 是 postgres 資料目錄，由本 stack 擁有。
#   * `volumes:` 裡的相對路徑都從「本檔所在目錄」解析，這是根 `include:`
#     讓每個 stack 自給自足的關鍵。
#
services:
  db:
    # pgvector + PostgreSQL 18（對齊上游預設）。
    image: pgvector/pgvector:pg${HINDSIGHT_DB_VERSION:-18}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HINDSIGHT_DB_USER:-hindsight}
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:?HINDSIGHT_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${HINDSIGHT_DB_NAME:-hindsight}
    volumes:
      # pg18 image 在第一次 init 時會建這個子目錄。
      - ./pg_data:/var/lib/postgresql/${HINDSIGHT_DB_VERSION:-18}/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HINDSIGHT_DB_USER:-hindsight} -d ${HINDSIGHT_DB_NAME:-hindsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_VERSION:-latest-slim}
    # slim image 的 venv 沒包 flashrank (optional rerank backend)。
    # `uv pip install --python <venv> --link-mode=copy flashrank` 把 wheel
    # 寫進 venv site-packages。首次啟動多 ~5-10s，後續近乎零成本。
    entrypoint: ["/bin/sh", "-c", "uv pip install --python /app/api/.venv/bin/python --quiet --link-mode=copy flashrank && exec /app/start-all.sh"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 官方 image 直接讀 HINDSIGHT_API_LLM_API_KEY；host .env 用的是
      # HINDSIGHT_LLM_API_KEY（沒 infix）— 顯式 map 過去。
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_LLM_PROVIDER:-minimax}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-MiniMax-M3}
      HINDSIGHT_API_DATABASE_URL: postgresql://${HINDSIGHT_DB_USER:-hindsight}:${HINDSIGHT_DB_PASSWORD:?HINDSIGHT_DB_PASSWORD must be set in .env}@db:5432/${HINDSIGHT_DB_NAME:-hindsight}

      # 走雲端 OpenRouter 跑 baai/bge-m3 (1024-dim, 100+ 語言, 中文涵蓋
      # 比 text-embedding-3-small 好)；不用本地 TEI sidecar。
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: openrouter
      HINDSIGHT_API_EMBEDDINGS_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HINDSIGHT_API_EMBEDDINGS_OPENROUTER_MODEL: ${HINDSIGHT_EMBEDDINGS_MODEL:-baai/bge-m3}

      # flashrank — ONNX 為基礎、隨 image 內建、不需外部 API key。
      # 多語言涵蓋比 Cohere rerank-multilingual-v3 弱，但對中英混雜內容
      # 已足夠；用 ~200MB RAM 換掉一個新 vendor dependency。
      HINDSIGHT_API_RERANKER_PROVIDER: flashrank

      # Control Plane (http://127.0.0.1:9999) 的 access key。
      # image 沒 baked 這個 var,沒顯式 map 就不會進 container,UI 會完全 open。
      #HINDSIGHT_CP_ACCESS_KEY: ${HINDSIGHT_CP_ACCESS_KEY:?HINDSIGHT_CP_ACCESS_KEY must be set in .env}
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9999:9999"
    healthcheck:
      # 127.0.0.1 而非 localhost：pgvector/pgvector:pg18 image 的 /etc/hosts
      # 把 `localhost` 排在 IPv6 `::1` 前面，但 healthcheck 走 IPv4 直連，
      # 會誤判。
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
